<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirecting to NanthAI Edge</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="referrer" content="no-referrer" />
    <script>
      (function () {
        var deepLinkBase = 'nanthai-edge://auth/callback';
        var query = window.location.search || '';
        var deepLink = deepLinkBase + query;
        var manualLink = document.getElementById('manual-open-link');

        if (manualLink) {
          manualLink.setAttribute('href', deepLink);
        }

        window.location.replace(deepLink);
      })();
    </script>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7fb;
        color: #111827;
      }
      main {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      section {
        width: 100%;
        max-width: 480px;
        text-align: center;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 16px;
        color: #4b5563;
      }
      a {
        display: inline-block;
        text-decoration: none;
        background: #111827;
        color: #ffffff;
        border-radius: 8px;
        padding: 10px 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Opening NanthAI Edge...</h1>
        <p>If the app does not open automatically, use the button below.</p>
        <a id="manual-open-link" href="nanthai-edge://auth/callback">Open NanthAI Edge</a>
        <noscript>
          <p>JavaScript is disabled. Open the app manually to continue sign-in.</p>
          <a href="nanthai-edge://auth/callback">Open NanthAI Edge</a>
        </noscript>
      </section>
    </main>
  </body>
</html>
